<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI案内係</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat-box { flex-grow: 1; background: white; border-radius: 8px; padding: 15px; overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; width: 100%; }
        .message.bot { justify-content: flex-start; }
        .message.user { justify-content: flex-end; }
        .bubble { padding: 10px; border-radius: 8px; max-width: 80%; line-height: 1.5; word-wrap: break-word; }
        .bot .bubble { color: #2c3e50; background: #e9ecef; }
        .user .bubble { color: white; background: #007bff; }
        .input-area { display: flex; gap: 5px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div id="chat-box">
        <div class="message bot"><div class="bubble">メタバース空間へようこそ。なにか私にできることはありますか？</div></div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力...">
        <button onclick="sendMessage()">送信</button>
    </div>

    <script>
        // URLの末尾にくっついてきた名前（?name=〇〇）を取り出す
        const urlParams = new URLSearchParams(window.location.search);
        let myName = urlParams.get('name') || '不明なユーザー';

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            inputField.value = '';

            const chatBox = document.getElementById('chat-box');
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = loadingId;
            loadingDiv.innerHTML = `<div class="bubble">考え中...</div>`;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // VPSのAPIサーバーへ通信
                const apiUrl = 'https://wa.kuratalab.net/api/chat';
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message, playerName: myName })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                document.getElementById(loadingId).remove();
                appendMessage(data.reply, 'bot');
                
            } catch (error) {
                console.error('通信エラー:',
