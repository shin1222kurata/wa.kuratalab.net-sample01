<script>
        // 【大改良】URLの末尾にくっついてきた名前（?name=〇〇）を取り出す
        const urlParams = new URLSearchParams(window.location.search);
        let myName = urlParams.get('name') || '不明なユーザー';

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            appendMessage(message, 'user');
            inputField.value = '';

            const chatBox = document.getElementById('chat-box');
            const loadingId = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = loadingId;
            loadingDiv.innerHTML = `<div class="bubble">考え中...</div>`;
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                // ★ご自身のドメインに書き換えてください
                const apiUrl = 'https://wa.kuratalab.net/api/chat';
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // URLから受け取った myName をサーバーへ送る
                    body: JSON.stringify({ message: message, playerName: myName })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const data = await response.json();

                document.getElementById(loadingId).remove();
                appendMessage(data.reply, 'bot');
                
            } catch (error) {
                console.error('通信エラー:', error);
                document.getElementById(loadingId).remove();
                appendMessage("サーバーとの通信に失敗しました。案内係は現在お休み中です。", 'bot');
            }
        }

        function appendMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${sender}`;
            msgDiv.innerHTML = `<div class="bubble">${text}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
