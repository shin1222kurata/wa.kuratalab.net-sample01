<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI案内係</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; margin: 0; padding: 10px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        #chat-box { flex-grow: 1; background: white; border-radius: 8px; padding: 15px; overflow-y: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .message { margin-bottom: 15px; line-height: 1.5; }
        .bot { color: #2c3e50; background: #e9ecef; padding: 10px; border-radius: 8px; display: inline-block; max-width: 80%; }
        .user { color: white; background: #007bff; padding: 10px; border-radius: 8px; display: inline-block; max-width: 80%; float: right; clear: both; }
        .input-area { display: flex; gap: 5px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div id="chat-box">
        <div class="message"><div class="bot">なにか私にできることはありますか？</div></div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="メッセージを入力...">
        <button onclick="sendMessage()">送信</button>
    </div>

    <script>
        function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            // ユーザーの発言を画面に追加
            appendMessage(message, 'user');
            inputField.value = '';

            // 擬似的なAIのローディング処理（将来ここにGoogle Cloud API連携を実装します）
            setTimeout(() => {
                // 仮の応答テキスト
                const reply = "ご質問ありがとうございます。現在、生成AI連携の準備中です。";
                appendMessage(reply, 'bot');
            }, 1000);
        }

        function appendMessage(text, sender) {
            const chatBox = document.getElementById('chat-box');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `<div class="${sender}">${text}</div>`;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Enterキーで送信できるようにする
        document.getElementById('user-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
